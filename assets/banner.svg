    <rect x="1010" y="228" width="140" height="44" rx="22" fill="#0F172A" stroke="#334155"/>
    <text x="1038" y="256" fill="#22C55E" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="600">
      Tailwind
