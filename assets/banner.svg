    </text>

    <rect x="1135" y="170" width="90" height="44" rx="22" fill="#0F172A" stroke="#334155"/>
    <text x="1158" y="198" fill="#FACC15" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="600">
