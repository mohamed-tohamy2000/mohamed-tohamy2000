<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.5" stop-color="#0B1F33"/>
      <stop offset="1" stop-color="#12324A"/>
    </linearGradient>

    <linearGradient id="accent" x1="180" y1="70" x2="980" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.12"/>
    </linearGradient>

    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="28" fill="url(#bg)"/>

  <circle cx="1080" cy="70" r="110" fill="#38BDF8" fill-opacity="0.18" filter="url(#blur1)"/>
  <circle cx="190" cy="290" r="120" fill="#22C55E" fill-opacity="0.10" filter="url(#blur1)"/>

  <rect x="70" y="58" width="7" height="204" rx="3.5" fill="#38BDF8"/>
  <rect x="92" y="58" width="1118" height="204" rx="24" fill="url(#accent)" fill-opacity="0.28"/>

  <text x="120" y="138" fill="white" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Mohamed Tohamy
  </text>

  <text x="122" y="188" fill="#C7D2FE" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="500">
    Front-End Developer | React.js Developer
  </text>

  <text x="122" y="228" fill="#94A3B8" font-size="20" font-family="Segoe UI, Arial, sans-serif">
