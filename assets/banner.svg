  <g opacity="0.9">
    <rect x="930" y="170" width="190" height="44" rx="22" fill="#0F172A" stroke="#334155"/>
    <text x="965" y="198" fill="#38BDF8" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="600">
